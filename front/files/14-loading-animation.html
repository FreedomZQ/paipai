<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拍拍伴读 - 加载等待动画</title>
    <link rel="stylesheet" href="paipai-loading.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: linear-gradient(135deg, #FFD166 0%, #06D6A0 100%);
            --navy: #06265A;
            --text: #24384F;
            --muted: #64758C;
            --surface: #FFFFFF;
            --soft: #F7FBFF;
            --line: #E4EDF6;
            --shadow: 0 10px 28px rgba(0, 42, 106, 0.10);
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 50% 0%, rgba(6, 214, 160, 0.18), transparent 32%),
                #FAFAFA;
        }

        .container {
            width: min(100%, 860px);
            min-height: 100vh;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .app-mark {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            box-shadow: var(--shadow);
        }

        h1 {
            color: var(--navy);
            font-size: 21px;
            line-height: 1.25;
        }

        .subtitle {
            margin-top: 4px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.45;
        }

        .preview-stage {
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
            padding: 28px 20px;
            border-radius: 24px;
            background:
                radial-gradient(circle at 50% 34%, rgba(66, 223, 244, 0.24), transparent 34%),
                linear-gradient(160deg, #08306B 0%, #041B43 100%);
            box-shadow: var(--shadow);
        }

        .preview-panel {
            width: min(100%, 280px);
            padding: 26px 20px 22px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.96);
            text-align: center;
        }

        .scenario-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 18px;
        }

        .scenario-card {
            display: flex;
            align-items: center;
            gap: 14px;
            min-height: 112px;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 20px;
            background: var(--surface);
            box-shadow: 0 6px 16px rgba(0, 42, 106, 0.06);
        }

        .scenario-copy {
            flex: 1;
            min-width: 0;
        }

        .scenario-title {
            color: var(--navy);
            font-size: 15px;
            font-weight: 700;
            line-height: 1.35;
        }

        .scenario-desc {
            margin-top: 4px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }

        .actions {
            display: flex;
            gap: 10px;
            padding-bottom: 20px;
        }

        button {
            flex: 1;
            min-height: 46px;
            border: 0;
            border-radius: 16px;
            font: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .primary-button {
            color: #FFFFFF;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            box-shadow: 0 8px 18px rgba(255, 107, 107, 0.24);
        }

        .secondary-button {
            color: var(--navy);
            background: #EAF8FF;
        }

        .hidden {
            display: none !important;
        }

        @media (min-width: 700px) {
            .container {
                padding: 28px;
            }

            .scenario-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .scenario-card {
                flex-direction: column;
                align-items: center;
                text-align: center;
                min-height: 210px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img class="app-mark" src="paipai_icon.png" alt="拍拍伴读图标">
            <div>
                <h1>拍拍伴读加载动画</h1>
                <div class="subtitle">图标中心保持稳定，扫描角标和圆环以 2.6 秒一圈轻柔旋转。</div>
            </div>
        </header>

        <main>
            <section class="preview-stage">
                <div class="preview-panel">
                    <div class="paipai-wait" role="status" aria-live="polite">
                        <div class="paipai-loader" aria-hidden="true">
                            <div class="paipai-loader__ring"></div>
                            <div class="paipai-loader__scan">
                                <span class="paipai-loader__corner paipai-loader__corner--tl"></span>
                                <span class="paipai-loader__corner paipai-loader__corner--tr"></span>
                                <span class="paipai-loader__corner paipai-loader__corner--br"></span>
                                <span class="paipai-loader__corner paipai-loader__corner--bl"></span>
                                <span class="paipai-loader__spark paipai-loader__spark--one"></span>
                                <span class="paipai-loader__spark paipai-loader__spark--two"></span>
                            </div>
                            <div class="paipai-loader__badge">
                                <img src="paipai_icon.png" alt="">
                            </div>
                        </div>
                        <div class="loading-text" id="previewText">正在努力识别中...</div>
                        <div class="paipai-wait__subcaption" id="previewSubtext">小兔正在帮你找句子</div>
                    </div>
                </div>
            </section>

            <section class="scenario-grid">
                <article class="scenario-card">
                    <div class="paipai-wait paipai-wait--small" aria-hidden="true">
                        <div class="paipai-loader">
                            <div class="paipai-loader__ring"></div>
                            <div class="paipai-loader__scan">
                                <span class="paipai-loader__corner paipai-loader__corner--tl"></span>
                                <span class="paipai-loader__corner paipai-loader__corner--tr"></span>
                                <span class="paipai-loader__corner paipai-loader__corner--br"></span>
                                <span class="paipai-loader__corner paipai-loader__corner--bl"></span>
                                <span class="paipai-loader__spark paipai-loader__spark--one"></span>
                                <span class="paipai-loader__spark paipai-loader__spark--two"></span>
                            </div>
                            <div class="paipai-loader__badge">
                                <img src="paipai_icon.png" alt="">
                            </div>
                        </div>
                    </div>
                    <div class="scenario-copy">
                        <div class="scenario-title">OCR 文字识别</div>
                        <div class="scenario-desc">正在努力识别中... 小兔正在帮你找句子</div>
                    </div>
                </article>

                <article class="scenario-card">
                    <div class="paipai-wait paipai-wait--small" aria-hidden="true">
                        <div class="paipai-loader">
                            <div class="paipai-loader__ring"></div>
                            <div class="paipai-loader__scan">
                                <span class="paipai-loader__corner paipai-loader__corner--tl"></span>
                                <span class="paipai-loader__corner paipai-loader__corner--tr"></span>
                                <span class="paipai-loader__corner paipai-loader__corner--br"></span>
                                <span class="paipai-loader__corner paipai-loader__corner--bl"></span>
                                <span class="paipai-loader__spark paipai-loader__spark--one"></span>
                                <span class="paipai-loader__spark paipai-loader__spark--two"></span>
                            </div>
                            <div class="paipai-loader__badge">
                                <img src="paipai_icon.png" alt="">
                            </div>
                        </div>
                    </div>
                    <div class="scenario-copy">
                        <div class="scenario-title">内容加载</div>
                        <div class="scenario-desc">故事马上出现啦... 准备好一起读一读</div>
                    </div>
                </article>

                <article class="scenario-card">
                    <div class="paipai-wait paipai-wait--small" aria-hidden="true">
                        <div class="paipai-loader">
                            <div class="paipai-loader__ring"></div>
                            <div class="paipai-loader__scan">
                                <span class="paipai-loader__corner paipai-loader__corner--tl"></span>
                                <span class="paipai-loader__corner paipai-loader__corner--tr"></span>
                                <span class="paipai-loader__corner paipai-loader__corner--br"></span>
                                <span class="paipai-loader__corner paipai-loader__corner--bl"></span>
                                <span class="paipai-loader__spark paipai-loader__spark--one"></span>
                                <span class="paipai-loader__spark paipai-loader__spark--two"></span>
                            </div>
                            <div class="paipai-loader__badge">
                                <img src="paipai_icon.png" alt="">
                            </div>
                        </div>
                    </div>
                    <div class="scenario-copy">
                        <div class="scenario-title">数据同步</div>
                        <div class="scenario-desc">正在整理学习星星... 进度很快就到家</div>
                    </div>
                </article>
            </section>

            <div class="actions">
                <button class="secondary-button" type="button" onclick="setScenario('故事马上出现啦...', '准备好一起读一读')">内容加载</button>
                <button class="primary-button" type="button" onclick="showOverlay()">查看居中等待</button>
            </div>
        </main>
    </div>

    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loading-content">
            <div class="paipai-wait" role="status" aria-live="polite">
                <div class="paipai-loader" aria-hidden="true">
                    <div class="paipai-loader__ring"></div>
                    <div class="paipai-loader__scan">
                        <span class="paipai-loader__corner paipai-loader__corner--tl"></span>
                        <span class="paipai-loader__corner paipai-loader__corner--tr"></span>
                        <span class="paipai-loader__corner paipai-loader__corner--br"></span>
                        <span class="paipai-loader__corner paipai-loader__corner--bl"></span>
                        <span class="paipai-loader__spark paipai-loader__spark--one"></span>
                        <span class="paipai-loader__spark paipai-loader__spark--two"></span>
                    </div>
                    <div class="paipai-loader__badge">
                        <img src="paipai_icon.png" alt="">
                    </div>
                </div>
                <div class="loading-text">正在努力识别中...</div>
                <div class="paipai-wait__subcaption">小兔正在帮你找句子</div>
            </div>
        </div>
    </div>

    <script>
        const previewText = document.getElementById('previewText');
        const previewSubtext = document.getElementById('previewSubtext');
        const overlay = document.getElementById('loadingOverlay');

        function setScenario(text, subtext) {
            previewText.textContent = text;
            previewSubtext.textContent = subtext;
        }

        function showOverlay() {
            overlay.classList.remove('hidden');
            window.setTimeout(function() {
                overlay.classList.add('hidden');
            }, 2600);
        }

        overlay.addEventListener('click', function(event) {
            if (event.target === overlay) {
                overlay.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
