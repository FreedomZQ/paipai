<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拍拍伴读 - 启动页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #FFD166 0%, #06D6A0 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        
        .logo {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 16px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .app-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .slogan {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        
        /* 响应式设计 */
        @media (min-width: 768px) {
            .logo {
                font-size: 64px;
            }
            
            .app-name {
                font-size: 32px;
            }
            
            .slogan {
                font-size: 20px;
            }
        }
        
        @media (min-width: 1024px) {
            .container {
                max-width: 800px;
                margin: 0 auto;
            }
        }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: white;
            margin: 0 4px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        
        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(0.8);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📚</div>
        <div class="app-name">拍拍伴读</div>
        <div class="app-name">Paipai Read Along</div>
        <div class="slogan">拍一句，听一句，慢慢会读</div>
        <div class="loading">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
    </div>
</body>
</html>
