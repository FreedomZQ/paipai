name: PaipaiReadAlong
options:
  minimumXcodeGenVersion: 2.38.0
  bundleIdPrefix: com.paipai
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: 'com.paipai.readalong.dev'
    IPHONEOS_DEPLOYMENT_TARGET: '18.0'
    SWIFT_VERSION: '5.10'
    DEVELOPMENT_TEAM: 'S79P567WCU'
    MARKETING_VERSION: '1.0.0'
    CURRENT_PROJECT_VERSION: '1'
targets:
  PaipaiReadAlong:
    type: application
    # P0 release scope: first launch targets iOS/iPadOS 18.0+ only.
    # macOS/Catalyst should be re-enabled only after a dedicated compile and UX pass.
    platform: iOS
    sources:
      - path: PaipaiReadAlong
    dependencies: []
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PaipaiReadAlong/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
        CODE_SIGN_ENTITLEMENTS: PaipaiReadAlong/Resources/PaipaiReadAlongDebug.entitlements
      configs:
        Release:
          CODE_SIGN_ENTITLEMENTS: PaipaiReadAlong/Resources/PaipaiReadAlong.entitlements
    scheme:
      testTargets:
        - PaipaiReadAlongTests
  PaipaiReadAlongTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PaipaiReadAlongTests
    dependencies:
      - target: PaipaiReadAlong
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.paipai.readalong.tests
