# ==============================
# fitmystery（健康打卡盲盒）应用定义
# ==============================
# 说明：
# 1. 该定义只新增 fitmystery 自己的 appCode / API 前缀 / 表前缀，不改变 reading / saving。
# 2. FitMystery 已纳入当前 release-gate 发布波次；Apple/App Store 凭证缺口会作为 external blockers 暴露，
#    不应通过关闭 support 来绕过提审前检查。
# 3. 所有付费权益、抽盒次数、随机开盒结果以后端 ledger / entitlement 为准。

app:
  code: fitmystery
  name: 健康打卡盲盒
  apiPrefix: /api/v1/fitmystery
  tablePrefix: fit_
  support:
    legalRequired: "true"
    appleSignInRequired: "true"
    billingRequired: "true"
  release:
    requiredForCurrentWave: "true"
    minimumIosVersion: "15.0"
    minimumIpadosVersion: "15.0"
  auth:
    demoSessionEnabled: "false"
    bootstrapSessionEnabled: "false"
    apple:
      clientId: com.fitmystery.app
      teamId: ""
      keyId: ""
      privateKey: ""
      audience: com.fitmystery.app
      redirectUri: ""
      environment: production
      tokenEndpoint: https://appleid.apple.com/auth/token
      jwksUrl: https://appleid.apple.com/auth/keys
      revokeEndpoint: https://appleid.apple.com/auth/revoke
      remoteExchangeEnabled: "true"
      nativeIdentityTokenSessionEnabled: "false"
  billing:
    appstore:
      bundleId: com.fitmystery.app
      environment: production
      allowSandbox: "false"
      # App Store 下载页 URL。生产环境拿到真实 App Apple ID 后配置，例如 https://apps.apple.com/app/id1234567890；
      # 客户端只能通过后端版本策略接口获取该 URL，不允许在前端硬编码。
      appStoreUrl: ""
      appAppleId: ""
      issuerId: ""
      keyId: ""
      privateKey: ""
    entitlements:
      productMappings:
        com.fitmystery.pro.monthly: pro_access
        com.fitmystery.pro.yearly: pro_access
        com.fitmystery.box5: box_chance_pack_5
        com.fitmystery.box10: box_chance_pack_10
        com.fitmystery.box25: box_chance_pack_25
      refreshPolicy:
        candidateLimit: "20"
        cooldownMinutes: "5"
