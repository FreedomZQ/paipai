# ==============================
# saving（省钱项目）应用定义
# ==============================
# 说明：
# 1. 该文件描述 saving app 在统一后端中的能力开关与计费策略。
# 2. 首发版本要求 Sign in with Apple；仅保留兼容路由，不再给正式客户端启用匿名 bootstrap。

app:
  # 应用唯一编码，需与 backend.apps.supported 中的值一致
  code: saving
  # 应用展示名称
  name: 省钱项目
  # 应用兼容层 API 前缀
  apiPrefix: /v1
  # 应用业务表前缀
  tablePrefix: saving_
  support:
    # 是否涉及法律/合规材料
    legalRequired: "true"
    # saving 首发要求 Sign in with Apple，避免匿名账号/内购绑定带来的审核和售后风险
    appleSignInRequired: "true"
    # 是否启用 App Store 计费能力
    billingRequired: "true"

  release:
    # saving 当前进入上线前最终门禁；release-gate 必须显式覆盖 iOS 发布、Apple 登录和 App Store 计费配置。
    requiredForCurrentWave: "true"
    minimumIosVersion: "15.0"
    minimumIpadosVersion: "15.0"

  auth:
    # 正式客户端必须走 Apple 登录；如需本地调试可通过环境变量 backend.apps.saving.app.auth.bootstrapSessionEnabled 临时覆盖。
    demoSessionEnabled: "false"
    bootstrapSessionEnabled: "false"
    apple:
      # 默认值写在 app-definition 配置中；生产环境可用 backend.apps.saving.app.auth.apple.* 覆盖。
      clientId: com.savingsplanet.app
      teamId: ""
      keyId: ""
      privateKey: ""
      audience: com.savingsplanet.app
      redirectUri: ""
      environment: production
      tokenEndpoint: https://appleid.apple.com/auth/token
      jwksUrl: https://appleid.apple.com/auth/keys
      revokeEndpoint: https://appleid.apple.com/auth/revoke
      remoteExchangeEnabled: "true"
      nativeIdentityTokenSessionEnabled: "false"

  billing:
    appstore:
      # App Store bundleId 必须和 iOS PRODUCT_BUNDLE_IDENTIFIER / Apple 登录 clientId 保持一致。
      bundleId: com.savingsplanet.app
      environment: production
      allowSandbox: "false"
      # App Store 下载页 URL。生产环境拿到真实 App Apple ID 后配置，例如 https://apps.apple.com/app/id1234567890；
      # 客户端只能通过后端版本策略接口获取该 URL，不允许在前端硬编码。
      appStoreUrl: ""
      appAppleId: ""
      issuerId: ""
      keyId: ""
      privateKey: ""
    entitlements:
      productMappings:
        com.savingsplanet.app.pro.monthly: pro_access
      refreshPolicy:
        # 单次 entitlement refresh 最多挑选多少候选交易进行回源
        candidateLimit: "20"
        # 相同 user + originalTransactionId 的 refresh 冷却分钟数
        cooldownMinutes: "5"
