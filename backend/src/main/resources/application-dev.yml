# ==============================
# 开发环境配置
# ==============================
# 说明：
# 1. dev 允许使用本机默认数据库与 Redis 地址，便于快速启动。
# 2. 如需接入远端环境，可直接通过环境变量覆盖这里的默认值。

server:
  address: ${SERVER_ADDRESS:0.0.0.0}
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    # 本地 PostgreSQL 开发库地址
    url: jdbc:postgresql://127.0.0.1:5432/apphub
    username: pgtest
    password: 123456789
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      # 本地 Redis 默认地址
      host: 127.0.0.1
      port: 6379
      password: 123456789
      db: 0
      timeout: 3s
  flyway:
    # 开发环境启动时自动执行 migration，确保结构与代码同步
    enabled: true
    locations: classpath:db/first_version
    validate-on-migrate: true
    baseline-on-migrate: true

backend:
  # 明确标记当前为开发环境
  environment: dev
